<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Mobile Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  background: #020617;
}

.search-box {
  padding: 15px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  outline: none;
  font-size: 16px;
}

.result {
  margin: 10px;
  padding: 15px;
  background: #1e293b;
  border-radius: 15px;
}

a {
  color: #38bdf8;
  font-size: 18px;
  text-decoration: none;
}

p {
  font-size: 14px;
  color: #cbd5f5;
}
</style>
</head>

<body>

<header>🔍 My Search App</header>

<div class="search-box">
  <input id="searchBox" placeholder="Search..." oninput="search()">
</div>

<div id="results"></div>

<script>
let pages = [];

// Load your crawler data
fetch("https://friendly-meme-ndku.onrender.com/search?q=" + q)
  .then(res => res.json())
  .then(data => pages = data);

function search() {
  let q = document.getElementById("searchBox").value.toLowerCase();
  let results = document.getElementById("results");
  results.innerHTML = "";

  if (!q) return;

  let filtered = pages.filter(p => 
    p.title.toLowerCase().includes(q) ||
    p.content.includes(q)
  );

  filtered.forEach(p => {
    let div = document.createElement("div");
    div.className = "result";

    div.innerHTML = `
      <a href="${p.url}" target="_blank">${p.title}</a>
      <p>${p.content.slice(0,120)}...</p>
    `;

    results.appendChild(div);
  });
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
